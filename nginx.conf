server {
  listen 80;
  server_name dylanvanheerden.co.za www.dylanvanheerden.co.za www.dylanvh.com;

  return 301 https://dylanvh.com$request_uri;
}

server {
  listen 80 default_server;
  server_name dylanvh.com _;

  root /usr/share/nginx/html;
  index index.html;

  location /_astro/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
